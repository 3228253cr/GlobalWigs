<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הזמנה - Global Air Export</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark" style="background:var(--gae-blue)">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="bi bi-airplane-engines me-2"></i>GLOBAL AIR EXPORT
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="dashboard.html" class="text-white text-decoration-none"><i class="bi bi-list-ul me-1"></i>הזמנות</a>
                <button class="btn btn-sm btn-outline-light" onclick="signOut()"><i class="bi bi-box-arrow-left"></i></button>
            </div>
        </div>
    </nav>

    <div class="container py-4" style="max-width:1000px">
        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="mb-1" id="pageTitle"><i class="bi bi-file-earmark-plus me-2"></i>הזמנה חדשה</h4>
                <span id="orderBadge"></span>
            </div>
            <a href="dashboard.html" class="btn btn-outline-secondary"><i class="bi bi-arrow-right me-1"></i>חזרה</a>
        </div>

        <form id="orderForm">
            <!-- ===== SECTION 1: HEADER ===== -->
            <div class="section-card">
                <div class="section-header" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('show')">
                    <span><i class="bi bi-file-text me-2"></i>כותרת הזמנה</span>
                    <i class="bi bi-chevron-up"></i>
                </div>
                <div class="collapse show">
                    <div class="section-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">סוכן <span class="en">Agent</span></label>
                                <select id="agent_id" class="form-select"><option value="">בחר...</option></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">ספק <span class="en">Supplier</span></label>
                                <select id="supplier_id" class="form-select"><option value="">בחר...</option></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">לקוח <span class="en">Customer</span>
                                    <button type="button" class="btn btn-sm btn-outline-primary ms-2" data-bs-toggle="modal" data-bs-target="#newCustomerModal"><i class="bi bi-plus"></i></button>
                                </label>
                                <select id="customer_id" class="form-select" required><option value="">בחר לקוח...</option></select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">תאריך הזמנה <span class="en">Order Date</span></label>
                                <input type="date" id="order_date" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">תאריך אספקה <span class="en">Supply Date</span></label>
                                <input type="date" id="supply_date" class="form-control">
                            </div>
                            <div class="col-md-4" id="statusField" style="display:none">
                                <label class="form-label">סטטוס</label>
                                <select id="status" class="form-select">
                                    <option value="new">חדשה</option>
                                    <option value="preparing">בהכנה</option>
                                    <option value="packed">ארוזה</option>
                                    <option value="shipped">נשלחה</option>
                                    <option value="delivered">נמסרה</option>
                                    <option value="cancelled">בוטלה</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== SECTION 2: WIG DETAILS ===== -->
            <div class="section-card">
                <div class="section-header" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('show')">
                    <span><i class="bi bi-stars me-2"></i>פרטי הפיאה</span>
                    <i class="bi bi-chevron-up"></i>
                </div>
                <div class="collapse show">
                    <div class="section-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">מותג <span class="en">Brand</span></label>
                                <select id="brand" class="form-select"><option value="">בחר...</option></select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">צבע בסיסי <span class="en">Basic Color</span></label>
                                <select id="basic_color" class="form-select"><option value="">בחר...</option></select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">הייליט <span class="en">Highlight</span></label>
                                <select id="highlight" class="form-select"><option value="">בחר...</option></select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">סגנון <span class="en">Hair Style</span></label>
                                <select id="hair_style" class="form-select"><option value="">בחר...</option></select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">הייליט מיוחד <span class="en">Special Highlight</span></label>
                                <div class="input-group">
                                    <input type="text" id="special_highlight" class="form-control" placeholder="תיאור...">
                                    <span class="input-group-text">$ עלות נוספת</span>
                                    <input type="number" id="highlight_ext_fee" class="form-control" style="max-width:100px" step="0.01" min="0" value="0">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">צפיפות <span class="en">Density</span></label>
                                <select id="density" class="form-select"><option value="">בחר...</option></select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">מידת ראש <span class="en">Cap Size</span></label>
                                <select id="cap_size" class="form-select"><option value="">בחר...</option></select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">סוג ראש <span class="en">Top</span></label>
                                <select id="top_type" class="form-select"><option value="">בחר...</option></select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== SECTION 3: SIZE ===== -->
            <div class="section-card">
                <div class="section-header" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('show')">
                    <span><i class="bi bi-rulers me-2"></i>מידות <span class="en">Size</span></span>
                    <i class="bi bi-chevron-up"></i>
                </div>
                <div class="collapse show">
                    <div class="section-body">
                        <div class="row g-3">
                            <div class="col-md-3"><label class="form-label">אורך <span class="en">Length</span></label><input type="text" id="size_length" class="form-control"></div>
                            <div class="col-md-3"><label class="form-label">צוואר <span class="en">Neck</span></label><input type="text" id="size_neck" class="form-control"></div>
                            <div class="col-md-3"><label class="form-label">שיער <span class="en">Hair</span></label><input type="text" id="size_hair" class="form-control"></div>
                            <div class="col-md-3"><label class="form-label">עור <span class="en">Skin</span></label><input type="text" id="size_skin" class="form-control"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== SECTION 4: HAIR PROPERTIES ===== -->
            <div class="section-card">
                <div class="section-header" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('show')">
                    <span><i class="bi bi-magic me-2"></i>תכונות שיער <span class="en">Shade / Grade / Handtied</span></span>
                    <i class="bi bi-chevron-up"></i>
                </div>
                <div class="collapse show">
                    <div class="section-body">
                        <div class="mb-3">
                            <label class="form-label">גוון <span class="en">Shade</span></label>
                            <div class="radio-group" id="shadeGroup"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">דרגה <span class="en">Grade</span></label>
                            <div class="radio-group" id="gradeGroup"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">קשירת יד <span class="en">Handtied</span></label>
                            <div class="radio-group" id="handtiedGroup"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== SECTION 5: ACCESSORIES ===== -->
            <div class="section-card">
                <div class="section-header" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('show')">
                    <span><i class="bi bi-bag-plus me-2"></i>אביזרים <span class="en">Accessories</span></span>
                    <i class="bi bi-chevron-up"></i>
                </div>
                <div class="collapse show">
                    <div class="section-body">
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="acc_bangs_check" onchange="document.getElementById('bangs-fields').style.display=this.checked?'block':'none'">
                            <label class="form-check-label fw-bold">Bangs (פוני)</label>
                        </div>
                        <div id="bangs-fields" class="acc-row" style="display:none">
                            <div class="row g-2">
                                <div class="col-md-3"><input type="text" id="acc_bangs_length" class="form-control form-control-sm" placeholder="אורך"></div>
                                <div class="col-md-3"><input type="text" id="acc_bangs_color" class="form-control form-control-sm" placeholder="צבע"></div>
                                <div class="col-md-3"><input type="text" id="acc_bangs_hair_type" class="form-control form-control-sm" placeholder="סוג שיער"></div>
                            </div>
                        </div>

                        <div class="form-check mb-2 mt-3">
                            <input class="form-check-input" type="checkbox" id="acc_ponyclip_check" onchange="document.getElementById('ponyclip-fields').style.display=this.checked?'block':'none'">
                            <label class="form-check-label fw-bold">Ponyclip (קליפס קוקו)</label>
                        </div>
                        <div id="ponyclip-fields" class="acc-row" style="display:none">
                            <div class="row g-2">
                                <div class="col-md-3"><input type="text" id="acc_ponyclip_length" class="form-control form-control-sm" placeholder="אורך"></div>
                                <div class="col-md-3"><input type="text" id="acc_ponyclip_color" class="form-control form-control-sm" placeholder="צבע"></div>
                                <div class="col-md-3"><input type="text" id="acc_ponyclip_hair_type" class="form-control form-control-sm" placeholder="סוג שיער"></div>
                            </div>
                        </div>

                        <div class="form-check mb-2 mt-3">
                            <input class="form-check-input" type="checkbox" id="acc_rubberbands_check" onchange="document.getElementById('rubberbands-fields').style.display=this.checked?'block':'none'">
                            <label class="form-check-label fw-bold">Rubberbands (גומיות)</label>
                        </div>
                        <div id="rubberbands-fields" class="acc-row" style="display:none">
                            <div class="row g-2">
                                <div class="col-md-3"><input type="text" id="acc_rubberbands_length" class="form-control form-control-sm" placeholder="אורך"></div>
                                <div class="col-md-3"><input type="text" id="acc_rubberbands_hair_type" class="form-control form-control-sm" placeholder="סוג שיער"></div>
                                <div class="col-md-3">
                                    <select id="acc_rubberbands_curl" class="form-select form-select-sm">
                                        <option value="">סלסול...</option>
                                        <option value="straight">Straight</option>
                                        <option value="wavy">Wavy</option>
                                        <option value="curly">Curly</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== SECTION 6: DELIVERY ===== -->
            <div class="section-card">
                <div class="section-header" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('show')">
                    <span><i class="bi bi-truck me-2"></i>משלוח <span class="en">Delivery</span></span>
                    <i class="bi bi-chevron-up"></i>
                </div>
                <div class="collapse show">
                    <div class="section-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">שיטת משלוח</label>
                                <select id="shipping_method" class="form-select" onchange="document.getElementById('private-fields').classList.toggle('show',this.value==='private')">
                                    <option value="">בחר...</option>
                                    <option value="dhl">DHL</option>
                                    <option value="fedex">FedEx</option>
                                    <option value="ups">UPS</option>
                                    <option value="ems">EMS</option>
                                    <option value="private">Private (פרטי)</option>
                                    <option value="other">אחר</option>
                                </select>
                            </div>
                            <div class="col-md-3"><label class="form-label">מספר מעקב <span class="en">Tracking</span></label><input type="text" id="tracking_number" class="form-control"></div>
                            <div class="col-md-3"><label class="form-label">תאריך משלוח</label><input type="date" id="delivery_date" class="form-control"></div>
                            <div class="col-md-3"><label class="form-label">הגעה משוערת <span class="en">ETA</span></label><input type="date" id="estimated_arrival" class="form-control"></div>
                        </div>
                        <div id="private-fields" class="private-fields mt-3">
                            <h6 class="text-muted"><i class="bi bi-person-badge me-1"></i>פרטי נמען פרטי</h6>
                            <div class="row g-3">
                                <div class="col-md-3"><input type="text" id="private_name" class="form-control" placeholder="שם"></div>
                                <div class="col-md-3"><input type="text" id="private_address" class="form-control" placeholder="כתובת"></div>
                                <div class="col-md-3"><input type="text" id="private_city" class="form-control" placeholder="עיר"></div>
                                <div class="col-md-3"><input type="text" id="private_phone" class="form-control" placeholder="טלפון"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== SECTION 7: PRICE ===== -->
            <div class="section-card">
                <div class="section-header" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('show')">
                    <span><i class="bi bi-currency-dollar me-2"></i>מחיר והערות</span>
                    <i class="bi bi-chevron-up"></i>
                </div>
                <div class="collapse show">
                    <div class="section-body">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">מחיר <span class="en">Price</span></label>
                                <input type="number" id="unit_price" class="form-control" step="0.01" min="0" oninput="calcTotal()">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">מטבע</label>
                                <select id="currency" class="form-select" onchange="calcTotal()">
                                    <option value="USD">$ USD</option>
                                    <option value="ILS">₪ ILS</option>
                                    <option value="EUR">€ EUR</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">סה"כ (כולל תוספות)</label>
                                <input type="text" id="total_display" class="form-control fw-bold text-success" readonly>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">סטטוס תשלום</label>
                                <select id="payment_status" class="form-select">
                                    <option value="unpaid">לא שולם</option>
                                    <option value="partial">חלקי</option>
                                    <option value="paid">שולם</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-3">
                            <label class="form-label">הערות <span class="en">Notes</span></label>
                            <textarea id="notes" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <div class="text-center py-3">
                <button type="submit" class="btn btn-gae btn-lg" id="submitBtn">
                    <i class="bi bi-check-circle me-2"></i>שמור הזמנה
                </button>
                <button type="button" class="btn btn-outline-danger btn-lg ms-2 d-none" id="deleteBtn" onclick="deleteOrder()">
                    <i class="bi bi-trash me-1"></i>מחק
                </button>
            </div>
        </form>
    </div>

    <!-- New Customer Modal -->
    <div class="modal fade" id="newCustomerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--gae-blue);color:#fff">
                    <h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>לקוח חדש</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-12"><input type="text" id="new_cust_name" class="form-control" placeholder="שם לקוח *" required></div>
                        <div class="col-6"><input type="text" id="new_cust_phone" class="form-control" placeholder="טלפון"></div>
                        <div class="col-6"><input type="email" id="new_cust_email" class="form-control" placeholder="אימייל"></div>
                        <div class="col-12"><input type="text" id="new_cust_address" class="form-control" placeholder="כתובת"></div>
                        <div class="col-6"><input type="text" id="new_cust_state" class="form-control" placeholder="מדינה/מחוז"></div>
                        <div class="col-6"><input type="text" id="new_cust_country" class="form-control" placeholder="ארץ"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-gae" onclick="saveNewCustomer()"><i class="bi bi-check me-1"></i>שמור</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
        <div id="toast" class="toast align-items-center text-bg-success border-0" role="alert">
            <div class="d-flex"><div class="toast-body" id="toastMsg"></div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script>
        let editMode = false;
        let orderId = null;

        // Get order ID from URL
        const params = new URLSearchParams(window.location.search);
        if (params.get('id')) {
            orderId = parseInt(params.get('id'));
            editMode = true;
        }

        (async () => {
            const session = await requireAuth();
            if (!session) return;

            // Load dropdowns
            await loadDropdowns();

            // Load agents, suppliers, customers
            await loadEntities();

            // Set today's date
            if (!editMode) {
                document.getElementById('order_date').value = new Date().toISOString().split('T')[0];
            }

            // Load order if editing
            if (editMode) await loadOrder();
        })();

        async function loadDropdowns() {
            const categories = ['brand','basic_color','highlight','hair_style','density','cap_size','top_type'];
            for (const cat of categories) {
                const values = await getLookupValues(cat);
                const select = document.getElementById(cat);
                values.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.value;
                    opt.textContent = v.label || v.value;
                    select.appendChild(opt);
                });
            }

            // Radio groups
            const radioCategories = { shade: 'shadeGroup', grade: 'gradeGroup', handtied: 'handtiedGroup' };
            for (const [cat, groupId] of Object.entries(radioCategories)) {
                const values = await getLookupValues(cat);
                const group = document.getElementById(groupId);
                values.forEach(v => {
                    group.innerHTML += `
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="${cat}" id="${cat}_${v.value}" value="${v.value}">
                            <label class="form-check-label" for="${cat}_${v.value}">${v.label || v.value}</label>
                        </div>`;
                });
            }
        }

        async function loadEntities() {
            for (const table of ['agents', 'suppliers', 'customers']) {
                const records = await getActiveRecords(table);
                const select = document.getElementById(table === 'customers' ? 'customer_id' : table.slice(0, -1) + '_id');
                // Fix: agent_id, supplier_id, customer_id
                const selectId = table === 'agents' ? 'agent_id' : table === 'suppliers' ? 'supplier_id' : 'customer_id';
                const sel = document.getElementById(selectId);
                records.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.id;
                    opt.textContent = r.name + (r.country ? ` (${r.country})` : '');
                    sel.appendChild(opt);
                });
            }
        }

        async function loadOrder() {
            const { data: order, error } = await supabase.from('orders').select('*').eq('id', orderId).single();
            if (error || !order) { alert('הזמנה לא נמצאה'); window.location.href = 'dashboard.html'; return; }

            document.getElementById('pageTitle').innerHTML = `<i class="bi bi-pencil me-2"></i>עריכת הזמנה`;
            document.getElementById('orderBadge').innerHTML = `<span class="order-number-badge">${order.order_number}</span>`;
            document.getElementById('submitBtn').innerHTML = '<i class="bi bi-check-circle me-2"></i>עדכן הזמנה';
            document.getElementById('statusField').style.display = '';
            document.getElementById('deleteBtn').classList.remove('d-none');

            // Fill all fields
            const fields = ['agent_id','supplier_id','customer_id','order_date','supply_date','status',
                'brand','basic_color','highlight','hair_style','special_highlight','highlight_ext_fee',
                'density','cap_size','top_type','size_length','size_neck','size_hair','size_skin',
                'unit_price','currency','payment_status','notes'];

            fields.forEach(f => {
                const el = document.getElementById(f);
                if (el && order[f] !== null && order[f] !== undefined) el.value = order[f];
            });

            // Radio buttons
            ['shade','grade','handtied'].forEach(f => {
                if (order[f]) {
                    const radio = document.getElementById(`${f}_${order[f]}`);
                    if (radio) radio.checked = true;
                }
            });

            calcTotal();

            // Load accessories
            const { data: accessories } = await supabase.from('order_accessories').select('*').eq('order_id', orderId);
            if (accessories) {
                accessories.forEach(acc => {
                    document.getElementById(`acc_${acc.type}_check`).checked = true;
                    document.getElementById(`${acc.type}-fields`).style.display = 'block';
                    if (acc.length) document.getElementById(`acc_${acc.type}_length`).value = acc.length;
                    if (acc.color) document.getElementById(`acc_${acc.type}_color`).value = acc.color;
                    if (acc.hair_type) document.getElementById(`acc_${acc.type}_hair_type`).value = acc.hair_type;
                    if (acc.curl_type && acc.type === 'rubberbands') document.getElementById(`acc_rubberbands_curl`).value = acc.curl_type;
                });
            }

            // Load shipment
            const { data: shipments } = await supabase.from('shipments').select('*').eq('order_id', orderId);
            if (shipments && shipments.length > 0) {
                const s = shipments[0];
                ['shipping_method','tracking_number','delivery_date','estimated_arrival','private_name','private_address','private_city','private_phone'].forEach(f => {
                    const el = document.getElementById(f);
                    if (el && s[f]) el.value = s[f];
                });
                if (s.shipping_method === 'private') document.getElementById('private-fields').classList.add('show');
            }
        }

        function calcTotal() {
            const price = parseFloat(document.getElementById('unit_price').value) || 0;
            const ext = parseFloat(document.getElementById('highlight_ext_fee').value) || 0;
            const total = price + ext;
            const sym = { USD: '$', ILS: '₪', EUR: '€' }[document.getElementById('currency').value] || '$';
            document.getElementById('total_display').value = sym + ' ' + total.toFixed(2);
        }

        // Form submit
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const user = await getCurrentUser();
            const getVal = id => document.getElementById(id)?.value?.trim() || null;
            const getRadio = name => document.querySelector(`input[name="${name}"]:checked`)?.value || null;

            const orderData = {
                agent_id: getVal('agent_id') ? parseInt(getVal('agent_id')) : null,
                supplier_id: getVal('supplier_id') ? parseInt(getVal('supplier_id')) : null,
                customer_id: getVal('customer_id') ? parseInt(getVal('customer_id')) : null,
                order_date: getVal('order_date'),
                supply_date: getVal('supply_date') || null,
                status: editMode ? getVal('status') : 'new',
                brand: getVal('brand'), basic_color: getVal('basic_color'),
                highlight: getVal('highlight'), special_highlight: getVal('special_highlight'),
                highlight_ext_fee: parseFloat(getVal('highlight_ext_fee')) || 0,
                hair_style: getVal('hair_style'), density: getVal('density'),
                cap_size: getVal('cap_size'), top_type: getVal('top_type'),
                size_length: getVal('size_length'), size_neck: getVal('size_neck'),
                size_hair: getVal('size_hair'), size_skin: getVal('size_skin'),
                shade: getRadio('shade'), grade: getRadio('grade'), handtied: getRadio('handtied'),
                unit_price: parseFloat(getVal('unit_price')) || 0,
                currency: getVal('currency') || 'USD',
                total_amount: (parseFloat(getVal('unit_price')) || 0) + (parseFloat(getVal('highlight_ext_fee')) || 0),
                payment_status: getVal('payment_status') || 'unpaid',
                notes: getVal('notes'),
            };

            if (!editMode) orderData.created_by = user?.id;

            let savedId;
            if (editMode) {
                const { error } = await supabase.from('orders').update(orderData).eq('id', orderId);
                if (error) { alert('שגיאה: ' + error.message); return; }
                savedId = orderId;
            } else {
                const { data, error } = await supabase.from('orders').insert(orderData).select().single();
                if (error) { alert('שגיאה: ' + error.message); return; }
                savedId = data.id;
            }

            // Save accessories
            await supabase.from('order_accessories').delete().eq('order_id', savedId);
            for (const type of ['bangs', 'ponyclip', 'rubberbands']) {
                if (document.getElementById(`acc_${type}_check`).checked) {
                    await supabase.from('order_accessories').insert({
                        order_id: savedId,
                        type,
                        length: getVal(`acc_${type}_length`),
                        color: getVal(`acc_${type}_color`),
                        hair_type: getVal(`acc_${type}_hair_type`),
                        curl_type: type === 'rubberbands' ? getVal('acc_rubberbands_curl') : null,
                    });
                }
            }

            // Save shipment
            if (getVal('shipping_method')) {
                const shipData = {
                    order_id: savedId,
                    shipping_method: getVal('shipping_method'),
                    tracking_number: getVal('tracking_number'),
                    delivery_date: getVal('delivery_date') || null,
                    estimated_arrival: getVal('estimated_arrival') || null,
                    private_name: getVal('private_name'),
                    private_address: getVal('private_address'),
                    private_city: getVal('private_city'),
                    private_phone: getVal('private_phone'),
                };

                await supabase.from('shipments').delete().eq('order_id', savedId);
                await supabase.from('shipments').insert(shipData);
            }

            showToast(editMode ? 'הזמנה עודכנה!' : 'הזמנה נוצרה!');
            setTimeout(() => window.location.href = `order.html?id=${savedId}`, 1000);
        });

        async function deleteOrder() {
            if (!confirm('למחוק את ההזמנה?')) return;
            await supabase.from('orders').delete().eq('id', orderId);
            window.location.href = 'dashboard.html';
        }

        async function saveNewCustomer() {
            const name = document.getElementById('new_cust_name').value.trim();
            if (!name) { alert('נא למלא שם'); return; }

            const { data, error } = await supabase.from('customers').insert({
                name,
                phone: document.getElementById('new_cust_phone').value.trim() || null,
                email: document.getElementById('new_cust_email').value.trim() || null,
                address: document.getElementById('new_cust_address').value.trim() || null,
                state: document.getElementById('new_cust_state').value.trim() || null,
                country: document.getElementById('new_cust_country').value.trim() || null,
            }).select().single();

            if (error) { alert('שגיאה: ' + error.message); return; }

            const select = document.getElementById('customer_id');
            const opt = document.createElement('option');
            opt.value = data.id;
            opt.textContent = data.name;
            opt.selected = true;
            select.appendChild(opt);

            bootstrap.Modal.getInstance(document.getElementById('newCustomerModal')).hide();
            showToast('לקוח נוסף!');
        }

        // Ext fee listener
        document.getElementById('highlight_ext_fee').addEventListener('input', calcTotal);
    </script>
</body>
</html>
