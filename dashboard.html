<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Global Air Export</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark" style="background:var(--gae-blue)">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <i class="bi bi-airplane-engines me-2"></i>GLOBAL AIR EXPORT
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="order.html" class="btn btn-sm btn-warning fw-bold"><i class="bi bi-plus-lg me-1"></i>הזמנה חדשה</a>
                <a href="customers.html" class="text-white text-decoration-none"><i class="bi bi-people me-1"></i>לקוחות</a>
                <a href="settings.html" class="text-white text-decoration-none"><i class="bi bi-gear"></i></a>
                <span class="text-white-50" id="userEmail"></span>
                <button class="btn btn-sm btn-outline-light" onclick="signOut()"><i class="bi bi-box-arrow-left"></i></button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <!-- Stats Cards -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="stat-card" style="border-right-color:#1565c0">
                    <div class="stat-icon" style="background:#e3f2fd;color:#1565c0"><i class="bi bi-file-earmark-text"></i></div>
                    <div><div class="stat-number" id="statTotal">0</div><div class="stat-label">סה"כ הזמנות</div></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="border-right-color:#e65100">
                    <div class="stat-icon" style="background:#fff3e0;color:#e65100"><i class="bi bi-clock-history"></i></div>
                    <div><div class="stat-number" id="statNew">0</div><div class="stat-label">חדשות</div></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="border-right-color:#2e7d32">
                    <div class="stat-icon" style="background:#e8f5e9;color:#2e7d32"><i class="bi bi-truck"></i></div>
                    <div><div class="stat-number" id="statShipped">0</div><div class="stat-label">נשלחו</div></div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="border-right-color:#6a1b9a">
                    <div class="stat-icon" style="background:#f3e5f5;color:#6a1b9a"><i class="bi bi-currency-dollar"></i></div>
                    <div><div class="stat-number" id="statRevenue">$0</div><div class="stat-label">הכנסות החודש</div></div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="card mb-3">
            <div class="card-body py-2">
                <div class="row align-items-center g-2">
                    <div class="col-auto">
                        <i class="bi bi-funnel me-1"></i>סינון:
                    </div>
                    <div class="col-md-2">
                        <select id="filterStatus" class="form-select form-select-sm" onchange="loadOrders()">
                            <option value="">כל הסטטוסים</option>
                            <option value="new">חדשה</option>
                            <option value="preparing">בהכנה</option>
                            <option value="packed">ארוזה</option>
                            <option value="shipped">נשלחה</option>
                            <option value="delivered">נמסרה</option>
                            <option value="cancelled">בוטלה</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select id="filterPayment" class="form-select form-select-sm" onchange="loadOrders()">
                            <option value="">כל התשלומים</option>
                            <option value="unpaid">לא שולם</option>
                            <option value="partial">חלקי</option>
                            <option value="paid">שולם</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="text" id="filterSearch" class="form-control form-control-sm" placeholder="חיפוש לפי שם לקוח / מספר הזמנה..." oninput="loadOrders()">
                    </div>
                    <div class="col-auto ms-auto">
                        <span class="text-muted small" id="resultCount"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Orders Table -->
        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>מס' הזמנה</th>
                            <th>לקוח</th>
                            <th>מותג</th>
                            <th>סגנון</th>
                            <th>מידה</th>
                            <th>תאריך</th>
                            <th>סכום</th>
                            <th>סטטוס</th>
                            <th>תשלום</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable">
                        <tr><td colspan="10" class="text-center py-5 text-muted">
                            <i class="bi bi-hourglass-split d-block" style="font-size:2rem"></i>טוען...
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
        <div id="toast" class="toast align-items-center text-bg-success border-0" role="alert">
            <div class="d-flex"><div class="toast-body" id="toastMsg"></div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script>
        const STATUS_MAP = {
            new: { label: 'חדשה', class: 'status-new' },
            preparing: { label: 'בהכנה', class: 'status-preparing' },
            packed: { label: 'ארוזה', class: 'status-packed' },
            shipped: { label: 'נשלחה', class: 'status-shipped' },
            delivered: { label: 'נמסרה', class: 'status-delivered' },
            cancelled: { label: 'בוטלה', class: 'status-cancelled' }
        };
        const PAY_MAP = {
            unpaid: { label: 'לא שולם', class: 'bg-danger' },
            partial: { label: 'חלקי', class: 'bg-warning text-dark' },
            paid: { label: 'שולם', class: 'bg-success' }
        };
        const CURRENCY_SYM = { USD: '$', ILS: '₪', EUR: '€' };
        const STYLE_MAP = { A: 'Straight', B: 'Flexible', C: 'Soft Wave', D: 'Wave', E: 'Curly' };

        (async () => {
            const session = await requireAuth();
            if (!session) return;
            document.getElementById('userEmail').textContent = session.user.email;
            await loadStats();
            await loadOrders();
        })();

        async function loadStats() {
            const { data: orders } = await supabase.from('orders').select('status, total_amount, order_date');
            if (!orders) return;

            const now = new Date();
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];

            document.getElementById('statTotal').textContent = orders.length;
            document.getElementById('statNew').textContent = orders.filter(o => o.status === 'new').length;
            document.getElementById('statShipped').textContent = orders.filter(o => ['shipped','delivered'].includes(o.status)).length;

            const monthRevenue = orders
                .filter(o => o.order_date >= monthStart && o.status !== 'cancelled')
                .reduce((sum, o) => sum + parseFloat(o.total_amount || 0), 0);
            document.getElementById('statRevenue').textContent = '$' + monthRevenue.toLocaleString();
        }

        async function loadOrders() {
            let query = supabase
                .from('orders')
                .select('*, customers(name, country), agents(name), suppliers(name)')
                .order('created_at', { ascending: false });

            const status = document.getElementById('filterStatus').value;
            const payment = document.getElementById('filterPayment').value;
            const search = document.getElementById('filterSearch').value.trim();

            if (status) query = query.eq('status', status);
            if (payment) query = query.eq('payment_status', payment);

            const { data: orders, error } = await query;
            if (error) { console.error(error); return; }

            let filtered = orders || [];
            if (search) {
                const s = search.toLowerCase();
                filtered = filtered.filter(o =>
                    (o.order_number || '').toLowerCase().includes(s) ||
                    (o.customers?.name || '').toLowerCase().includes(s)
                );
            }

            document.getElementById('resultCount').textContent = `${filtered.length} הזמנות`;

            const tbody = document.getElementById('ordersTable');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center py-5 text-muted"><i class="bi bi-inbox d-block" style="font-size:2rem"></i>אין הזמנות</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(o => {
                const st = STATUS_MAP[o.status] || { label: o.status, class: '' };
                const pay = PAY_MAP[o.payment_status] || { label: o.payment_status, class: 'bg-secondary' };
                const sym = CURRENCY_SYM[o.currency] || '$';
                const style = o.hair_style ? (STYLE_MAP[o.hair_style] || o.hair_style) : '-';

                return `<tr class="order-row" onclick="window.location='order.html?id=${o.id}'" style="cursor:pointer">
                    <td><span class="fw-bold text-primary">${o.order_number || '-'}</span></td>
                    <td>${o.customers?.name || '-'} <small class="text-muted">${o.customers?.country || ''}</small></td>
                    <td>${o.brand || '-'}</td>
                    <td>${style}</td>
                    <td>${o.cap_size || '-'}</td>
                    <td>${o.order_date || '-'}</td>
                    <td class="fw-bold">${sym}${parseFloat(o.total_amount || 0).toFixed(0)}</td>
                    <td><span class="badge ${st.class}">${st.label}</span></td>
                    <td><span class="badge ${pay.class}">${pay.label}</span></td>
                    <td>
                        <a href="order.html?id=${o.id}" class="btn btn-sm btn-outline-primary" onclick="event.stopPropagation()">
                            <i class="bi bi-pencil"></i>
                        </a>
                    </td>
                </tr>`;
            }).join('');
        }
    </script>
</body>
</html>
