<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הגדרות - Global Air Export</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark" style="background:var(--gae-blue)">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="dashboard.html"><i class="bi bi-airplane-engines me-2"></i>GLOBAL AIR EXPORT</a>
            <div class="d-flex align-items-center gap-3">
                <a href="dashboard.html" class="text-white text-decoration-none"><i class="bi bi-list-ul me-1"></i>הזמנות</a>
                <button class="btn btn-sm btn-outline-light" onclick="signOut()"><i class="bi bi-box-arrow-left"></i></button>
            </div>
        </div>
    </nav>

    <div class="container py-4" style="max-width:900px">
        <h4 class="mb-4"><i class="bi bi-gear me-2"></i>הגדרות</h4>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#agents"><i class="bi bi-person-badge me-1"></i>סוכנים</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#suppliers"><i class="bi bi-building me-1"></i>ספקים</a></li>
        </ul>

        <div class="tab-content">
            <!-- Agents -->
            <div class="tab-pane fade show active" id="agents">
                <div class="d-flex justify-content-between mb-3">
                    <h5>סוכנים</h5>
                    <button class="btn btn-sm btn-gae" onclick="openEntityModal('agents')"><i class="bi bi-plus me-1"></i>הוסף סוכן</button>
                </div>
                <div class="card"><div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>שם</th><th>טלפון</th><th>אימייל</th><th></th></tr></thead>
                        <tbody id="agentsTable"></tbody>
                    </table>
                </div></div>
            </div>

            <!-- Suppliers -->
            <div class="tab-pane fade" id="suppliers">
                <div class="d-flex justify-content-between mb-3">
                    <h5>ספקים</h5>
                    <button class="btn btn-sm btn-gae" onclick="openEntityModal('suppliers')"><i class="bi bi-plus me-1"></i>הוסף ספק</button>
                </div>
                <div class="card"><div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>שם</th><th>איש קשר</th><th>טלפון</th><th>אימייל</th><th>ארץ</th><th></th></tr></thead>
                        <tbody id="suppliersTable"></tbody>
                    </table>
                </div></div>
            </div>
        </div>
    </div>

    <!-- Entity Modal -->
    <div class="modal fade" id="entityModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--gae-blue);color:#fff">
                    <h5 class="modal-title" id="entityModalTitle">הוספה</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="entityModalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-gae" onclick="saveEntity()"><i class="bi bi-check me-1"></i>שמור</button>
                </div>
            </div>
        </div>
    </div>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
        <div id="toast" class="toast align-items-center text-bg-success border-0"><div class="d-flex"><div class="toast-body" id="toastMsg"></div></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script>
        let entityModal, currentTable, editingId;

        (async () => {
            await requireAuth();
            entityModal = new bootstrap.Modal(document.getElementById('entityModal'));
            await loadAgents();
            await loadSuppliers();
        })();

        async function loadAgents() {
            const { data } = await supabase.from('agents').select('*').eq('is_active', true).order('name');
            document.getElementById('agentsTable').innerHTML = (data || []).map(a => `
                <tr>
                    <td class="fw-bold">${a.name}</td>
                    <td>${a.phone || '-'}</td>
                    <td>${a.email || '-'}</td>
                    <td><button class="btn btn-sm btn-outline-primary" onclick='openEntityModal("agents",${JSON.stringify(a)})'><i class="bi bi-pencil"></i></button></td>
                </tr>`).join('') || '<tr><td colspan="4" class="text-center py-3 text-muted">אין סוכנים</td></tr>';
        }

        async function loadSuppliers() {
            const { data } = await supabase.from('suppliers').select('*').eq('is_active', true).order('name');
            document.getElementById('suppliersTable').innerHTML = (data || []).map(s => `
                <tr>
                    <td class="fw-bold">${s.name}</td>
                    <td>${s.contact_person || '-'}</td>
                    <td>${s.phone || '-'}</td>
                    <td>${s.email || '-'}</td>
                    <td>${s.country || '-'}</td>
                    <td><button class="btn btn-sm btn-outline-primary" onclick='openEntityModal("suppliers",${JSON.stringify(s)})'><i class="bi bi-pencil"></i></button></td>
                </tr>`).join('') || '<tr><td colspan="6" class="text-center py-3 text-muted">אין ספקים</td></tr>';
        }

        function openEntityModal(table, entity = null) {
            currentTable = table;
            editingId = entity?.id || null;
            const isAgent = table === 'agents';

            document.getElementById('entityModalTitle').textContent = entity
                ? (isAgent ? 'עריכת סוכן' : 'עריכת ספק')
                : (isAgent ? 'סוכן חדש' : 'ספק חדש');

            let html = `<div class="row g-3">
                <div class="col-12"><label class="form-label">שם *</label><input type="text" id="ent_name" class="form-control" value="${entity?.name || ''}"></div>
                <div class="col-6"><label class="form-label">טלפון</label><input type="text" id="ent_phone" class="form-control" value="${entity?.phone || ''}"></div>
                <div class="col-6"><label class="form-label">אימייל</label><input type="email" id="ent_email" class="form-control" value="${entity?.email || ''}"></div>`;

            if (!isAgent) {
                html += `<div class="col-6"><label class="form-label">איש קשר</label><input type="text" id="ent_contact" class="form-control" value="${entity?.contact_person || ''}"></div>
                    <div class="col-6"><label class="form-label">ארץ</label><input type="text" id="ent_country" class="form-control" value="${entity?.country || ''}"></div>`;
            }
            html += '</div>';
            document.getElementById('entityModalBody').innerHTML = html;
            entityModal.show();
        }

        async function saveEntity() {
            const name = document.getElementById('ent_name').value.trim();
            if (!name) { alert('נא למלא שם'); return; }

            const data = {
                name,
                phone: document.getElementById('ent_phone').value.trim() || null,
                email: document.getElementById('ent_email').value.trim() || null,
            };

            if (currentTable === 'suppliers') {
                data.contact_person = document.getElementById('ent_contact').value.trim() || null;
                data.country = document.getElementById('ent_country').value.trim() || null;
            }

            if (editingId) {
                await supabase.from(currentTable).update(data).eq('id', editingId);
            } else {
                await supabase.from(currentTable).insert(data);
            }

            entityModal.hide();
            showToast('נשמר!');
            if (currentTable === 'agents') await loadAgents();
            else await loadSuppliers();
        }
    </script>
</body>
</html>
