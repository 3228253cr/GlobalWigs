<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חיוג - Global Air Export</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .dialer-card { max-width: 420px; margin: 0 auto; }
        .phone-display { font-size: 1.6rem; text-align: center; letter-spacing: 2px; direction: ltr; }
        .keypad button { font-size: 1.4rem; font-weight: 600; padding: 14px 0; border-radius: 12px; }
        .keypad .sub { display: block; font-size: 0.6rem; color: #888; letter-spacing: 2px; }
        .call-controls .btn { width: 64px; height: 64px; border-radius: 50%; font-size: 1.4rem; }
        #callTimer { font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background:var(--gae-blue)">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="dashboard.html"><i class="bi bi-airplane-engines me-2"></i>GLOBAL AIR EXPORT</a>
            <div class="d-flex align-items-center gap-3">
                <a href="dashboard.html" class="text-white text-decoration-none"><i class="bi bi-list-ul me-1"></i>הזמנות</a>
                <a href="customers.html" class="text-white text-decoration-none"><i class="bi bi-people me-1"></i>לקוחות</a>
                <button class="btn btn-sm btn-outline-light" onclick="signOut()"><i class="bi bi-box-arrow-left"></i></button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div id="configWarning" class="alert alert-warning d-none">
            <i class="bi bi-exclamation-triangle me-2"></i>
            המערכת עדיין לא מחוברת ל-Twilio. יש להגדיר את <code>tokenUrl</code> בקובץ
            <code>js/voip.js</code> (כתובת ה-Function שפרסת ב-Twilio).
        </div>

        <div class="card dialer-card shadow-sm">
            <div class="card-header text-center" style="background:var(--gae-blue);color:#fff">
                <h5 class="mb-2"><i class="bi bi-telephone-outbound me-2"></i>חיוג</h5>
                <span id="callStatus" class="badge bg-secondary">מאתחל...</span>
                <span id="callTimer" class="ms-2 text-white-50">00:00</span>
            </div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <input type="tel" id="phoneInput" class="form-control phone-display" placeholder="+1 555 123 4567">
                    <button class="btn btn-outline-secondary" onclick="backspace()" title="מחק"><i class="bi bi-backspace"></i></button>
                </div>

                <div class="keypad row row-cols-3 g-2 mb-3">
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('1')">1<span class="sub">&nbsp;</span></button></div>
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('2')">2<span class="sub">ABC</span></button></div>
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('3')">3<span class="sub">DEF</span></button></div>
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('4')">4<span class="sub">GHI</span></button></div>
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('5')">5<span class="sub">JKL</span></button></div>
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('6')">6<span class="sub">MNO</span></button></div>
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('7')">7<span class="sub">PQRS</span></button></div>
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('8')">8<span class="sub">TUV</span></button></div>
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('9')">9<span class="sub">WXYZ</span></button></div>
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('*')">*<span class="sub">&nbsp;</span></button></div>
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('0')">0<span class="sub">+</span></button></div>
                    <div class="col"><button class="btn btn-light w-100" onclick="pressKey('#')">#<span class="sub">&nbsp;</span></button></div>
                </div>

                <div class="call-controls d-flex justify-content-center gap-4">
                    <button id="btnMute" class="btn btn-outline-secondary" onclick="toggleMute()" disabled title="השתק"><i class="bi bi-mic-fill"></i></button>
                    <button id="btnCall" class="btn btn-success" onclick="placeCall()" disabled title="חייג"><i class="bi bi-telephone-fill"></i></button>
                    <button id="btnHangup" class="btn btn-danger" onclick="hangUp()" disabled title="נתק"><i class="bi bi-telephone-x-fill"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
        <div id="toast" class="toast align-items-center text-bg-success border-0"><div class="d-flex"><div class="toast-body" id="toastMsg"></div></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2/dist/twilio.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/voip.js"></script>
    <script>
        (async () => {
            const session = await requireAuth();
            if (!session) return;

            // Pre-fill number from ?to=... (e.g. clicked from customers list)
            const params = new URLSearchParams(location.search);
            const to = params.get('to');
            if (to) document.getElementById('phoneInput').value = to;

            const user = await getCurrentUser();
            const identity = (user && user.email) ? user.email : 'agent';
            await initDevice(identity);
        })();
    </script>
</body>
</html>
