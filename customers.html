<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לקוחות - Global Air Export</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark" style="background:var(--gae-blue)">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="dashboard.html"><i class="bi bi-airplane-engines me-2"></i>GLOBAL AIR EXPORT</a>
            <div class="d-flex align-items-center gap-3">
                <a href="order.html" class="btn btn-sm btn-warning fw-bold"><i class="bi bi-plus-lg me-1"></i>הזמנה חדשה</a>
                <a href="dashboard.html" class="text-white text-decoration-none"><i class="bi bi-list-ul me-1"></i>הזמנות</a>
                <button class="btn btn-sm btn-outline-light" onclick="signOut()"><i class="bi bi-box-arrow-left"></i></button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4><i class="bi bi-people me-2"></i>ניהול לקוחות</h4>
            <button class="btn btn-gae" onclick="openModal()"><i class="bi bi-person-plus me-2"></i>לקוח חדש</button>
        </div>

        <div class="card mb-3">
            <div class="card-body py-2">
                <input type="text" id="searchBox" class="form-control form-control-sm" placeholder="חיפוש לפי שם, טלפון, אימייל..." oninput="loadCustomers()">
            </div>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr><th>שם</th><th>טלפון</th><th>אימייל</th><th>כתובת</th><th>מדינה</th><th>הזמנות</th><th></th></tr>
                    </thead>
                    <tbody id="custTable"><tr><td colspan="7" class="text-center py-5 text-muted">טוען...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="custModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--gae-blue);color:#fff">
                    <h5 class="modal-title" id="modalTitle"><i class="bi bi-person-plus me-2"></i>לקוח חדש</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit_id">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label">שם *</label><input type="text" id="m_name" class="form-control" required></div>
                        <div class="col-6"><label class="form-label">טלפון</label><input type="text" id="m_phone" class="form-control"></div>
                        <div class="col-6"><label class="form-label">וואטסאפ</label><input type="text" id="m_whatsapp" class="form-control"></div>
                        <div class="col-12"><label class="form-label">אימייל</label><input type="email" id="m_email" class="form-control"></div>
                        <div class="col-12"><label class="form-label">כתובת</label><input type="text" id="m_address" class="form-control"></div>
                        <div class="col-6"><label class="form-label">מדינה/מחוז</label><input type="text" id="m_state" class="form-control"></div>
                        <div class="col-6"><label class="form-label">ארץ</label><input type="text" id="m_country" class="form-control"></div>
                        <div class="col-12"><label class="form-label">הערות</label><textarea id="m_notes" class="form-control" rows="2"></textarea></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-gae" onclick="saveCustomer()"><i class="bi bi-check me-1"></i>שמור</button>
                </div>
            </div>
        </div>
    </div>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
        <div id="toast" class="toast align-items-center text-bg-success border-0"><div class="d-flex"><div class="toast-body" id="toastMsg"></div></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script>
        let modal;
        (async () => {
            await requireAuth();
            modal = new bootstrap.Modal(document.getElementById('custModal'));
            await loadCustomers();
        })();

        async function loadCustomers() {
            const search = document.getElementById('searchBox').value.trim().toLowerCase();
            const { data: customers } = await supabase.from('customers').select('*').eq('is_active', true).order('name');

            // Count orders per customer
            const { data: orders } = await supabase.from('orders').select('customer_id');
            const orderCounts = {};
            (orders || []).forEach(o => { orderCounts[o.customer_id] = (orderCounts[o.customer_id] || 0) + 1; });

            let filtered = customers || [];
            if (search) {
                filtered = filtered.filter(c =>
                    (c.name || '').toLowerCase().includes(search) ||
                    (c.phone || '').includes(search) ||
                    (c.email || '').toLowerCase().includes(search)
                );
            }

            const tbody = document.getElementById('custTable');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted"><i class="bi bi-people d-block" style="font-size:2rem"></i>אין לקוחות</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(c => `
                <tr>
                    <td class="fw-bold">${c.name}</td>
                    <td>${c.phone || '-'} ${c.whatsapp ? `<a href="https://wa.me/${c.whatsapp.replace(/[^0-9]/g,'')}" target="_blank" class="text-success ms-1"><i class="bi bi-whatsapp"></i></a>` : ''}</td>
                    <td>${c.email || '-'}</td>
                    <td>${c.address || '-'}</td>
                    <td>${c.country || '-'}</td>
                    <td><span class="badge bg-primary">${orderCounts[c.id] || 0}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1" onclick='editCustomer(${JSON.stringify(c)})'><i class="bi bi-pencil"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function openModal(cust = null) {
            document.getElementById('edit_id').value = cust ? cust.id : '';
            document.getElementById('modalTitle').innerHTML = cust ? '<i class="bi bi-pencil me-2"></i>עריכת לקוח' : '<i class="bi bi-person-plus me-2"></i>לקוח חדש';
            ['name','phone','whatsapp','email','address','state','country','notes'].forEach(f => {
                document.getElementById('m_' + f).value = cust ? (cust[f] || '') : '';
            });
            modal.show();
        }

        function editCustomer(c) { openModal(c); }

        async function saveCustomer() {
            const name = document.getElementById('m_name').value.trim();
            if (!name) { alert('נא למלא שם'); return; }

            const data = {
                name,
                phone: document.getElementById('m_phone').value.trim() || null,
                whatsapp: document.getElementById('m_whatsapp').value.trim() || null,
                email: document.getElementById('m_email').value.trim() || null,
                address: document.getElementById('m_address').value.trim() || null,
                state: document.getElementById('m_state').value.trim() || null,
                country: document.getElementById('m_country').value.trim() || null,
                notes: document.getElementById('m_notes').value.trim() || null,
            };

            const editId = document.getElementById('edit_id').value;
            if (editId) {
                await supabase.from('customers').update(data).eq('id', parseInt(editId));
                showToast('לקוח עודכן!');
            } else {
                await supabase.from('customers').insert(data);
                showToast('לקוח נוסף!');
            }

            modal.hide();
            await loadCustomers();
        }
    </script>
</body>
</html>
