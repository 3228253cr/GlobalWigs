<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Air Export - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --gae-blue: #1F4E79; --gae-gold: #D4A843; }
        body { background: linear-gradient(135deg, #1F4E79 0%, #2980b9 50%, #1a3a5c 100%); min-height: 100vh; display: flex; align-items: center; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .login-card { max-width: 420px; margin: 0 auto; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); overflow: hidden; }
        .login-header { background: linear-gradient(135deg, #0d2b45, #1F4E79); color: white; padding: 40px 30px 30px; text-align: center; }
        .login-header .logo-icon { font-size: 3rem; color: var(--gae-gold); }
        .login-header h3 { letter-spacing: 3px; margin-top: 10px; }
        .login-body { padding: 30px; background: #fff; }
        .form-control { border-radius: 10px; padding: 12px 16px; }
        .form-control:focus { border-color: var(--gae-blue); box-shadow: 0 0 0 0.2rem rgba(31,78,121,0.2); }
        .btn-login { background: var(--gae-blue); color: #fff; border-radius: 10px; padding: 12px; font-weight: 600; font-size: 1.05rem; letter-spacing: 1px; width: 100%; }
        .btn-login:hover { background: #174067; color: #fff; }
        .divider { display: flex; align-items: center; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #dee2e6; }
        .divider span { padding: 0 12px; color: #999; font-size: 0.85rem; }
        .btn-signup { border: 2px solid var(--gae-blue); color: var(--gae-blue); border-radius: 10px; padding: 10px; font-weight: 600; width: 100%; background: transparent; }
        .btn-signup:hover { background: var(--gae-blue); color: #fff; }
        .alert { border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <i class="bi bi-airplane-engines logo-icon"></i>
                <h3 class="mb-1">GLOBAL AIR EXPORT</h3>
                <small class="opacity-75">Wig Export Management System</small>
            </div>
            <div class="login-body">
                <div id="alertBox" class="alert d-none"></div>
                
                <!-- Login Form -->
                <div id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">אימייל</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="loginEmail" class="form-control" placeholder="your@email.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">סיסמה</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button class="btn btn-login" onclick="login()">
                        <i class="bi bi-box-arrow-in-left me-2"></i>כניסה
                    </button>
                    <div class="divider"><span>אין לך חשבון?</span></div>
                    <button class="btn btn-signup" onclick="toggleForm('signup')">
                        <i class="bi bi-person-plus me-2"></i>הרשמה
                    </button>
                </div>

                <!-- Signup Form -->
                <div id="signupForm" class="d-none">
                    <div class="mb-3">
                        <label class="form-label fw-bold">אימייל</label>
                        <input type="email" id="signupEmail" class="form-control" placeholder="your@email.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">סיסמה</label>
                        <input type="password" id="signupPassword" class="form-control" placeholder="לפחות 6 תווים">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">שם מלא</label>
                        <input type="text" id="signupName" class="form-control" placeholder="השם שלך">
                    </div>
                    <button class="btn btn-login" onclick="signup()">
                        <i class="bi bi-check-circle me-2"></i>צור חשבון
                    </button>
                    <div class="divider"><span>יש לך כבר חשבון?</span></div>
                    <button class="btn btn-signup" onclick="toggleForm('login')">
                        <i class="bi bi-box-arrow-in-left me-2"></i>חזרה לכניסה
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        // Check if already logged in
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'dashboard.html';
        });

        function toggleForm(form) {
            document.getElementById('loginForm').classList.toggle('d-none', form !== 'login');
            document.getElementById('signupForm').classList.toggle('d-none', form !== 'signup');
            document.getElementById('alertBox').classList.add('d-none');
        }

        function showAlert(msg, type = 'danger') {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type}`;
            box.innerHTML = `<i class="bi bi-${type === 'danger' ? 'exclamation-triangle' : 'check-circle'} me-2"></i>${msg}`;
        }

        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showAlert('נא למלא אימייל וסיסמה'); return; }

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                showAlert('אימייל או סיסמה שגויים');
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        async function signup() {
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const name = document.getElementById('signupName').value.trim();
            if (!email || !password) { showAlert('נא למלא אימייל וסיסמה'); return; }
            if (password.length < 6) { showAlert('סיסמה חייבת להכיל לפחות 6 תווים'); return; }

            const { error } = await supabase.auth.signUp({
                email, password,
                options: { data: { full_name: name } }
            });
            if (error) {
                showAlert(error.message);
            } else {
                showAlert('החשבון נוצר! בדוק את המייל לאישור.', 'success');
            }
        }

        // Enter key
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('loginForm').classList.contains('d-none')) login();
                else signup();
            }
        });
    </script>
</body>
</html>
